<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinMitra AEPS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;background:#f4f7fc;}
.container{padding:20px;}

.logo{display:block;margin:auto;width:150px;}

.brand{
text-align:center;
font-size:28px;
font-weight:700;
background: linear-gradient(to right, orange, red);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.sub{text-align:center;color:#666;margin-bottom:20px;}

.card{
background:white;
border-radius:20px;
padding:20px;
margin:15px 0;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
position:relative;
}

.ribbon{
position:absolute;
top:15px;
right:-40px;
background:#ff5722;
color:white;
padding:6px 50px;
transform:rotate(45deg);
}

.icon-box{
width:80px;height:80px;
background:#fff3e0;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.icon-box img{width:45px;}

.title{text-align:center;font-size:22px;font-weight:600;}
.price{text-align:center;font-size:32px;font-weight:700;}
.subprice{text-align:center;color:#777;font-size:13px;margin-bottom:15px;}

.list{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:14px;
}

.list div::before{
content:"✔ ";
color:#ff5722;
}

.btn{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(to right, orange, red);
color:white;
font-size:16px;
}

/* FORM */
.form-box{
display:none;
background:white;
padding:20px;
border-radius:15px;
margin-top:15px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<img src="finmitra.png" class="logo">
<div class="brand">FinMitra AEPS</div>
<div class="sub">Choose your plan below to start your digital journey</div>

<!-- RETAILER -->
<div class="card">
<div class="ribbon">Most Popular</div>

<div class="icon-box">
<img src="https://cdn-icons-png.flaticon.com/512/2838/2838912.png">
</div>

<div class="title">Retailer</div>
<div class="price">₹499</div>

<div class="list">
<div>AEPS</div>
<div>Aadhar Pay</div>
<div>Account Opening</div>
<div>Recharge</div>
<div>Money Transfer</div>
<div>Micro ATM</div>
</div>

<button class="btn" onclick="openForm('retailer')">Select Plan</button>
</div>

<!-- DISTRIBUTOR -->
<div class="card">

<div class="icon-box">
<img src="https://cdn-icons-png.flaticon.com/512/921/921347.png">
</div>

<div class="title">Distributor</div>
<div class="price">₹999</div>

<div class="list">
<div>Unlimited Retailers</div>
<div>High Commission</div>
<div>24x7 Support</div>
<div>Lifetime</div>
</div>

<button class="btn" onclick="openForm('distributor')">Select Plan</button>
</div>

<!-- FORM -->
<div class="form-box" id="formBox">
<h3 id="planTitle"></h3>

<input id="name" placeholder="Full Name *">
<input id="father" placeholder="Father Name *">
<input id="shop" placeholder="Shop Name *">
<input id="email" placeholder="Email *">
<input id="mobile" placeholder="Mobile *">
<input id="pan" placeholder="PAN *">
<input id="aadhaar" placeholder="Aadhaar *">

<select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="address" placeholder="Address *">
<input id="state" placeholder="State *">
<input id="city" placeholder="City *">
<input id="pincode" placeholder="Pincode *">

<button class="btn" onclick="submitForm()">Create My Account</button>
</div>

<!-- PAYMENT -->
<div class="form-box" id="paymentBox">
<h3>Complete Payment</h3>
<p>Amount: <b id="amount"></b></p>
<p>UPI: <b>Q99636372@ybl</b></p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=Q99636372@ybl">
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let plan="";

function openForm(p){
plan=p;
document.getElementById("formBox").style.display="block";

document.getElementById("planTitle").innerText =
p==="retailer" ? "Retailer ₹499" : "Distributor ₹999";

window.scrollTo({top:document.body.scrollHeight});
}

function submitForm(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;

if(name==""||mobile==""){
alert("Fill required fields");
return;
}

db.collection("users").add({
name:name,
mobile:mobile,
plan:plan,
time:new Date()
}).then(()=>{

document.getElementById("paymentBox").style.display="block";

document.getElementById("amount").innerText =
plan==="retailer" ? "₹499" : "₹999";

alert("Saved Successfully");

});
}
</script>

</body>
</html>
