<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiBank Seva</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f7fb;
}

.container { padding: 15px; }

.header { text-align:center; }

.card {
  background:white;
  border-radius:18px;
  padding:20px;
  margin:15px 0;
  border:2px solid #2d5cff;
}

.price { text-align:center; font-size:28px; font-weight:bold; }

.list {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.btn {
  background:linear-gradient(to right,#2d5cff,#5a7cff);
  color:white;
  padding:12px;
  border:none;
  width:100%;
  border-radius:10px;
}

.form-box {
  display:none;
  background:white;
  padding:20px;
  margin:10px 0;
  border-radius:10px;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">DigiBank Seva</h2>

<!-- RETAILER -->
<div class="card">
  <h3>Retailer</h3>
  <div class="price">₹499</div>

  <div class="list">
    <div>✔ AEPS</div>
    <div>✔ Aadhar Pay</div>
    <div>✔ Saving & Current</div>
    <div>✔ Recharges</div>
    <div>✔ Money Transfer</div>
    <div>✔ Micro ATM</div>
    <div>✔ PAN Service</div>
    <div>✔ And more...</div>
  </div>

  <button class="btn" onclick="openForm('retailer')">Select Plan</button>
</div>

<!-- DISTRIBUTOR -->
<div class="card">
  <h3>Distributor</h3>
  <div class="price">₹999</div>

  <div class="list">
    <div>✔ Unlimited Retailers</div>
    <div>✔ High Commission</div>
    <div>✔ 24x7 Support</div>
    <div>✔ Lifetime Validity</div>
  </div>

  <button class="btn" onclick="openForm('distributor')">Select Plan</button>
</div>

<!-- FORM -->
<div class="form-box" id="formBox">
  <h3 id="planTitle"></h3>

  <input id="name" placeholder="Full Name">
  <input id="mobile" placeholder="Mobile Number">
  <input id="email" placeholder="Email">

  <button class="btn" onclick="validateForm()">Create My Account</button>
</div>

<!-- PAYMENT -->
<div class="form-box" id="paymentBox">
  <h3>Complete Payment</h3>
  <p>Amount: <b id="amount"></b></p>
  <p>UPI: Q99636372@ybl</p>

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=Q99636372@ybl">
</div>

</div>

<script>
let plan="";

function openForm(p){
  plan=p;
  document.getElementById("formBox").style.display="block";

  if(p==="retailer"){
    document.getElementById("planTitle").innerText="Retailer ₹499";
  } else {
    document.getElementById("planTitle").innerText="Distributor ₹999";
  }
}

function validateForm(){
  let name=document.getElementById("name").value;
  let mobile=document.getElementById("mobile").value;
  let email=document.getElementById("email").value;

  if(name===""||mobile===""||email===""){
    alert("⚠️ Please fill all details first");
    return;
  }

  document.getElementById("paymentBox").style.display="block";

  if(plan==="retailer"){
    document.getElementById("amount").innerText="₹499";
  } else {
    document.getElementById("amount").innerText="₹999";
  }
}
</script>

</body>
</html>
